name: Continuous Delivery

on:
  workflow_dispatch:

env:
  GCP_PROJECT_ID: dev-farma-analytics-workspace
  CLOUD_RUN_SERVICE: challenge-mle-api
  CLOUD_RUN_REGION: us-central1

jobs:
  cloud-run-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t challenge-mle-api:latest .

      - name: Cloud Run deployment command
        run: |
          echo "Docker image built successfully."
          echo "Deployment target: ${CLOUD_RUN_SERVICE} (${CLOUD_RUN_REGION}) in ${GCP_PROJECT_ID}"
          echo "Run the following command after authenticating gcloud:"
          echo "gcloud run deploy ${CLOUD_RUN_SERVICE} --source . --region ${CLOUD_RUN_REGION} --allow-unauthenticated --project ${GCP_PROJECT_ID}"
